# Drop this file at .github/workflows/valid-demo.yml in the fork.
#
# Fires on every push to a PR branch. POSTs the PR coordinates to the smee
# channel with a Bearer VALID_API_KEY header. Smee forwards the request —
# headers included — to the api server's /environments/<env_id>/validate
# endpoint, which dispatches the job to our local preview handler.
#
# Repo secrets required:
#   VALID_SMEE_URL   — e.g. https://smee.io/abc123xyz
#   VALID_API_KEY    — api key for the team that owns the external env
#                      (create with: cd website/api && go run . --create-key <team>)

name: valid-demo

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Ping local valid handler via smee
        env:
          SMEE_URL: ${{ secrets.VALID_SMEE_URL }}
          VALID_API_KEY: ${{ secrets.VALID_API_KEY }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          SHA: ${{ github.event.pull_request.head.sha }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          if [ -z "$SMEE_URL" ] || [ -z "$VALID_API_KEY" ]; then
            echo "secrets VALID_SMEE_URL / VALID_API_KEY not configured" >&2
            exit 1
          fi
          payload=$(jq -nc \
            --arg repo "$REPO" \
            --argjson pr "$PR" \
            --arg sha "$SHA" \
            --arg ref "$HEAD_REF" \
            '{repo:$repo, pr:$pr, sha:$sha, pr_head_ref:$ref}')
          echo "payload: $payload"
          curl -fsS -X POST "$SMEE_URL" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $VALID_API_KEY" \
            -d "$payload"
